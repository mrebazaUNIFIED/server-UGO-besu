# Configuración para Validador 2 de Sunwest
# Rol: Valida bloques en consenso QBFT

data-path="data"
genesis-file="../../genesis.json"
profile="ENTERPRISE"

# Configuración P2P
p2p-enabled=true
p2p-host="0.0.0.0"
p2p-port=30309
max-peers=25

# Bootnodes
bootnodes=["enode://8486294552a3305705602e09478befccc9d4cccce79973b179c54cedc6573c5521d6d281fc789ed16f0272cfe6acdaa3bc71c7fa07785e32c34032706c943271@127.0.0.1:30303"]

# Discovery
discovery-enabled=true

# RPC HTTP (interno)
rpc-http-enabled=true
rpc-http-host="127.0.0.1"
rpc-http-port=8054
rpc-http-api=["ETH","NET","WEB3","ADMIN","QBFT","TXPOOL"]
rpc-http-cors-origins=["*"]

# RPC WebSocket
rpc-ws-enabled=false

# Logging
logging="INFO"

# Host allowlist
host-allowlist=["localhost","127.0.0.1"]

# Métricas
metrics-enabled=true
metrics-host="0.0.0.0"
metrics-port=9551

# Minería habilitada (es validador)
miner-enabled=true
miner-coinbase="0x0000000000000000000000000000000000000000"

# Sync mode
sync-mode="FULL"

# Network ID
network-id=12345

# Gas price
min-gas-price=0

