# Configuración para Validador 2 de Sunwest
# Rol: Valida bloques en consenso QBFT

data-path="data"
genesis-file="../../genesis.json"
profile="ENTERPRISE"

# Configuración P2P
p2p-enabled=true
p2p-host="0.0.0.0"
p2p-port=30309
max-peers=25

# Bootnodes
bootnodes=["enode://3cde83b0eed73af007f75f4396a44429e2021af2ba14d20a67020cdbb17f22649a22f483fb33311b30f103a51cde728a96a6ab213344ceaa8a59e0a0cb05e700@127.0.0.1:30303"]

# Discovery
discovery-enabled=true

# RPC HTTP (interno)
rpc-http-enabled=true
rpc-http-host="127.0.0.1"
rpc-http-port=8054
rpc-http-api=["ETH","NET","WEB3","ADMIN","QBFT","TXPOOL"]
rpc-http-cors-origins=["*"]

# RPC WebSocket
rpc-ws-enabled=false

# Logging
logging="INFO"

# Host allowlist
host-allowlist=["localhost","127.0.0.1"]

# Métricas
metrics-enabled=true
metrics-host="0.0.0.0"
metrics-port=9551

# Minería habilitada (es validador)
miner-enabled=true
miner-coinbase="0x0000000000000000000000000000000000000000"

# Sync mode
sync-mode="FULL"

# Network ID
network-id=12345

# Gas price
min-gas-price=0

