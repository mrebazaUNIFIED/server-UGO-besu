# Configuración para Validador 2 de FCI
# Rol: Valida bloques en consenso QBFT

data-path="data"
genesis-file="../../genesis.json"
profile="ENTERPRISE"

# Configuración P2P
p2p-enabled=true
p2p-host="0.0.0.0"
p2p-port=30305
max-peers=25

# Bootnodes
bootnodes=["enode://fe3c096785d74b04bab1c19efb26f2cf5ff246d2a2ea0fe0e1ea178bb951e4477bb6dfc8e6a298f9a09c0aaf3f9a3c8db95ab6ade3e75b546afdb1949e003acd@127.0.0.1:30303"]

# Discovery
discovery-enabled=true

# RPC HTTP (interno, no expuesto externamente en producción)
rpc-http-enabled=true
rpc-http-host="127.0.0.1"
rpc-http-port=8052
rpc-http-api=["ETH","NET","WEB3","ADMIN","QBFT","TXPOOL"]
rpc-http-cors-origins=["*"]

# RPC WebSocket
rpc-ws-enabled=false

# Logging
logging="INFO"

# Host allowlist
host-allowlist=["localhost","127.0.0.1"]

# Métricas
metrics-enabled=true
metrics-host="0.0.0.0"
metrics-port=9547

# Minería habilitada (es validador)
miner-enabled=true
miner-coinbase="0x0000000000000000000000000000000000000000"

# Sync mode
sync-mode="FULL"

# Network ID
network-id=12345

# Gas price
min-gas-price=0

